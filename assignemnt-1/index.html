<!DOCTYPE html>
<html>
<head>
    <title>See 'N' Say Storymaker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>See 'N' Say Storymaker</h1>
        
        <!-- story -->
<div class="toy">
    

    <div class="controls">
        <button id="part1">The turkey</button>
        <button id="part2">sat on</button>
        <button id="part3">a funny</button>
        <button id="part4">monkey</button>
        <button id="part5">on the moon</button>
    </div>
        
        <!-- control  -->
    <div class="actions">
        <button id="showStory">Show Story</button>
        <button id="randomStory">Random Story</button>
        <button id="reset">Reset</button>

        <!-- display -->
        <div class="story-box">
            <p class="placeholder" id="storyOutput">Click here</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
