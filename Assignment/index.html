<!DOCTYPE html>
<html>
<head>
    <title>See 'N' Say Storymaker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>See 'N' Say Storymaker</h1>
        
        <!-- story -->
        <div class="button-row">
            <button class="btn" id="characterBtn">WHO? <span id="characterValue">dog</span></button>
            <button class="btn" id="actionBtn">DOES WHAT? <span id="actionValue">runs</span></button>
            <button class="btn" id="placeBtn">WHERE? <span id="placeValue">in the park</span></button>
            <button class="btn" id="timeBtn">WHEN? <span id="timeValue">in the morning</span></button>
            <button class="btn" id="reasonBtn">WHY? <span id="reasonValue">because it's fun</span></button>
        </div>
        
        <!-- control  -->
        <div class="controls">
            <button class="control-btn" id="tellBtn">Tell Story</button>
            <button class="control-btn" id="randomBtn">Random</button>
            <button class="control-btn" id="resetBtn">Reset</button>
        </div>
        
        <!-- display -->
        <div class="story-box">
            <p class="placeholder" id="storyOutput">Click here</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
