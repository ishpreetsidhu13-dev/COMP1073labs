<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toy Car Creator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Toy Car Creator</h1>
        
        <!-- Input -->
        <form id="toyCarForm">
            <div class="form-group">
                <label for="brand">Brand:</label>
                <input type="text" id="brand" required>
            </div>
            <div class="form-group">
                <label for="model">Model:</label>
                <input type="text" id="model" required>
            </div>
            <div class="form-group">
                <label for="year">Year:</label>
                <input type="number" id="year" min="1900" max="2024" required>
            </div>
            <div class="form-group">
                <label for="colour">Colour:</label>
                <input type="text" id="colour" required>
            </div>
            <div class="form-group">
                <label for="scale">Scale:</label>
                <input type="text" id="scale" placeholder="e.g., 1:64" required>
            </div>
            <div class="form-group">
                <label for="material">Material:</label>
                <select id="material" required>
                    <option value="">Select Material</option>
                    <option value="Metal">Metal</option>
                    <option value="Plastic">Plastic</option>
                    <option value="Diecast">Diecast</option>
                </select>
            </div>
            <div class="form-group">
                <label for="vehicleType">Vehicle Type:</label>
                <select id="vehicleType" required>
                    <option value="">Select Type</option>
                    <option value="Sports">Sports</option>
                    <option value="Sedan">Sedan</option>
                    <option value="Truck">Truck</option>
                    <option value="Race">Race</option>
                </select>
            </div>
            <div class="form-group">
                <label for="tireType">Tire Type:</label>
                <select id="tireType" required>
                    <option value="">Select Tires</option>
                    <option value="Rubber">Rubber</option>
                    <option value="Plastic">Plastic</option>
                </select>
            </div>
            <div class="form-group">
                <label for="price">Price ($):</label>
                <input type="number" id="price" step="0.01" min="0" required>
            </div>
            
            <button type="submit" id="createBtn">Create Toy Car</button>
            <button type="button" id="randomBtn">Generate Random Car</button>
        </form>
